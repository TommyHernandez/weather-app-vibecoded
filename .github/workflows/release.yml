name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test:ci

      - name: Compute version and tag
        id: version
        run: |
          VERSION=$(bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); if (!pkg.version) process.exit(1); console.log(pkg.version);")
          if [ -z "$VERSION" ]; then
            echo "package.json version is missing"
            exit 1
          fi
          TAG="v_${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          EXISTING_TAG=$(git ls-remote --tags origin "refs/tags/$TAG")
          if [ -n "$EXISTING_TAG" ]; then
            echo "Tag $TAG already exists in remote. Bumping package.json version is required."
            exit 1
          fi

      - name: Build binaries
        run: bun run build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/weather-app-vibecoded-linux-x64
            dist/weather-app-vibecoded-windows-x64.exe
            dist/weather-app-vibecoded-darwin-x64
